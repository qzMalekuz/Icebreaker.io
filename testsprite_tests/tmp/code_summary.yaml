version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React 18 + Vite
  - ui_library: Tailwind CSS
  - other: Socket.io-client, React Router v6
routes:
  - path: /
    file: src/components/Landing.tsx
    auth_required: false
    description: Landing page with username input and "Find a Stranger" CTA
  - path: /waiting
    file: src/components/WaitingRoom.tsx
    auth_required: false
    description: Waiting room — emits join_queue via Socket.io, waits for match_found
  - path: /session/:roomId
    file: src/components/Session.tsx
    auth_required: false
    description: MCQ session — 3 rounds of multiple choice questions answered turn-by-turn
  - path: /result/:roomId
    file: src/components/Result.tsx
    auth_required: false
    description: Result page — shows "you matched" or "gone" based on game outcome
  - path: /safety
    file: src/components/Safety.tsx
    auth_required: false
    description: Static safety information page
  - path: /philosophy
    file: src/components/Philosophy.tsx
    auth_required: false
    description: Static philosophy/about page
features:
  - name: Username Entry
    description: User enters an alias (letters, numbers, spaces, underscores, max 20 chars) and clicks "Find a Stranger"
    files:
      - src/components/Landing.tsx
    entry_route: /
    user_interactions:
      - Type username into alias input field
      - Click "Find a Stranger" button or press Enter
      - See validation error for invalid characters
      - See RevealModal popup after valid submission
      - Click "Enter the Void" in modal to proceed to /waiting
    api_calls: []
    auth_required: false
  - name: Online Count Display
    description: Shows live count of strangers online via Socket.io queue_update event
    files:
      - src/components/Landing.tsx
    entry_route: /
    user_interactions:
      - See pulsing dot with online stranger count on landing page
    api_calls: []
    auth_required: false
  - name: Matchmaking Queue
    description: User waits in queue; server pairs two users and emits match_found
    files:
      - src/components/WaitingRoom.tsx
    entry_route: /waiting
    user_interactions:
      - See orbiting ring animation while waiting
      - See online stranger count in top-right panel
      - Click "Leave Lobby" to cancel and return to landing
      - See "connection found" state when matched before navigating to session
    api_calls: []
    auth_required: false
  - name: MCQ Session (3 Rounds)
    description: Two matched users answer 3 multiple-choice questions; answers revealed after both respond; mismatch ends session
    files:
      - src/components/Session.tsx
    entry_route: /session/:roomId
    user_interactions:
      - See current round indicator (1 of 3, 2 of 3, 3 of 3)
      - Read question text
      - Click one of the answer options
      - See "waiting for the stranger" state after submitting
      - See round result (matched / no match) with both answers revealed
      - Progress to next question if matched
      - Navigate to result page after all 3 rounds or a mismatch
      - See disconnected state if stranger leaves
    api_calls: []
    auth_required: false
  - name: Result / Outcome Screen
    description: Shows final outcome — "you matched" with share link if both stay connected, or "gone" if either vanishes
    files:
      - src/components/Result.tsx
    entry_route: /result/:roomId
    user_interactions:
      - See "you matched" heading with stranger username if connected
      - Toggle identity sharing on/off
      - Copy share link to clipboard
      - Click "match again" to return to landing and clear session
      - See "gone." screen if outcome is vanished
    api_calls: []
    auth_required: false
  - name: Navigation (Safety & Philosophy pages)
    description: Static informational pages accessible from navbar
    files:
      - src/components/Safety.tsx
      - src/components/Philosophy.tsx
    entry_route: /safety
    user_interactions:
      - Click "Safety" link in navbar
      - Click "Philosophy" link in navbar
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Session and Result pages rely on sessionStorage for state; direct URL access without prior flow will render nothing
    location: src/components/Session.tsx, src/components/Result.tsx
    impact: Tests must follow the full user flow rather than directly navigating to session/result URLs
  - issue: Real-time matching requires two simultaneous browser sessions; single-user tests cannot reach the session phase without a second socket client
    location: src/components/WaitingRoom.tsx
    impact: End-to-end session tests require coordinating two browser tabs or simulated socket clients
